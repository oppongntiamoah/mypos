{% extends 'base.html' %}
{% block title %}{{ action }} User{% endblock %}
{% block page_header %}
<div class="d-flex justify-content-between">
  <h4 class="font-weight-bold mb-0"><i class="fas fa-user-plus mr-2 text-primary"></i>{{ action }} User</h4>
  <a href="{% url 'accounts:users' %}" class="btn btn-outline-secondary">Back</a>
</div>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="row">
            <div class="col-6"><div class="form-group"><label class="font-weight-bold">First Name</label>
              <input type="text" name="first_name" class="form-control" value="{{ edit_user.first_name|default:'' }}"></div></div>
            <div class="col-6"><div class="form-group"><label class="font-weight-bold">Last Name</label>
              <input type="text" name="last_name" class="form-control" value="{{ edit_user.last_name|default:'' }}"></div></div>
          </div>
          <div class="form-group"><label class="font-weight-bold">Username *</label>
            <input type="text" name="username" class="form-control" value="{{ edit_user.username|default:'' }}"
                   {% if action == 'Edit' %}readonly{% endif %} required></div>
          <div class="form-group"><label class="font-weight-bold">
            {% if action == 'Edit' %}New Password (leave blank to keep){% else %}Password *{% endif %}
          </label>
            <input type="password" name="password" class="form-control"
                   {% if action == 'Add' %}required{% endif %}></div>
          <div class="form-group"><label class="font-weight-bold">Email</label>
            <input type="email" name="email" class="form-control" value="{{ edit_user.email|default:'' }}"></div>
          <div class="form-group"><label class="font-weight-bold">Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ profile.phone|default:'' }}"></div>
          <div class="form-group"><label class="font-weight-bold">Role</label>
            <select name="role" class="form-control">
              {% for val, label in roles %}
              <option value="{{ val }}" {% if profile.role == val %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select></div>
          <div class="custom-control custom-switch mb-3">
            <input type="checkbox" class="custom-control-input" id="is_staff_check" name="is_staff"
                   {% if edit_user.is_staff %}checked{% endif %}>
            <label class="custom-control-label" for="is_staff_check">Staff / Admin Access</label>
          </div>
          <div class="d-flex justify-content-end">
            <a href="{% url 'accounts:users' %}" class="btn btn-light mr-2">Cancel</a>
            <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save mr-1"></i>{{ action }} User</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MyPOS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2.0/dist/css/adminlte.min.css">
  <style>
    body { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
    .login-card { background: #fff; border-radius: 16px; padding: 2.5rem; width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-logo { text-align: center; margin-bottom: 1.5rem; }
    .login-logo i { font-size: 3rem; color: #2563eb; }
    .login-logo h4 { font-weight: 800; margin-top: .5rem; color: #1e293b; }
    .form-control { border-radius: 8px; border: 2px solid #e2e8f0; height: 46px; }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
    .btn-login { border-radius: 8px; height: 46px; font-weight: 700; font-size: 1rem;
      background: linear-gradient(135deg, #2563eb, #1e40af); border: none; }
    .btn-login:hover { background: linear-gradient(135deg, #1e40af, #1e3a5f); }
    .input-group-text { border: 2px solid #e2e8f0; border-right: none; background: #f8fafc; border-radius: 8px 0 0 8px; }
    .input-group .form-control { border-left: none; border-radius: 0 8px 8px 0; }
    .alert { border-radius: 8px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div><i class="fas fa-cash-register"></i></div>
      <h4>MyPOS System</h4>
      <p class="text-muted small mb-0">Sign in to your account</p>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-danger">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="font-weight-bold small text-muted">USERNAME</label>
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
          </div>
          <input type="text" name="username" class="form-control" placeholder="Enter username"
                 required autofocus autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label class="font-weight-bold small text-muted">PASSWORD</label>
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
          </div>
          <input type="password" name="password" class="form-control" placeholder="Enter password"
                 required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-login mt-3">
        <i class="fas fa-sign-in-alt mr-2"></i>Sign In
      </button>
    </form>

    <div class="text-center mt-3">
      <small class="text-muted">Point of Sale System &copy; {% now "Y" %}</small>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

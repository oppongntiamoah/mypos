{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}
{% block page_header %}
<h4 class="font-weight-bold mb-0"><i class="fas fa-user mr-2 text-primary"></i>My Profile</h4>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="text-center mb-3">
            {% if profile.avatar %}
            <img src="{{ profile.avatar.url }}" class="img-circle elevation-2" style="width:80px;height:80px;object-fit:cover;">
            {% else %}
            <div style="width:80px;height:80px;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;margin:0 auto;">
              <i class="fas fa-user fa-2x text-white"></i>
            </div>
            {% endif %}
            <h5 class="mt-2 mb-0 font-weight-bold">{{ profile.full_name }}</h5>
            <span class="badge badge-primary">{{ profile.get_role_display }}</span>
          </div>

          <div class="row">
            <div class="col-6">
              <div class="form-group"><label class="font-weight-bold small">First Name</label>
                <input type="text" name="first_name" class="form-control" value="{{ request.user.first_name }}"></div>
            </div>
            <div class="col-6">
              <div class="form-group"><label class="font-weight-bold small">Last Name</label>
                <input type="text" name="last_name" class="form-control" value="{{ request.user.last_name }}"></div>
            </div>
          </div>
          <div class="form-group"><label class="font-weight-bold small">Email</label>
            <input type="email" name="email" class="form-control" value="{{ request.user.email }}"></div>
          <div class="form-group"><label class="font-weight-bold small">Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ profile.phone }}"></div>
          <div class="form-group"><label class="font-weight-bold small">Profile Photo</label>
            <input type="file" name="avatar" class="form-control-file" accept="image/*"></div>

          <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i>Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}{{ action }} Supplier{% endblock %}
{% block page_header %}
<div class="d-flex justify-content-between">
  <h4 class="font-weight-bold mb-0"><i class="fas fa-building mr-2 text-primary"></i>{{ action }} Supplier</h4>
  <a href="{% url 'inventory:suppliers' %}" class="btn btn-outline-secondary">Back</a>
</div>
{% endblock %}
{% block content %}
<div class="col-md-6">
  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group"><label class="font-weight-bold">Company Name *</label>
          <input type="text" name="name" class="form-control" value="{{ supplier.name|default:'' }}" required></div>
        <div class="row">
          <div class="col-6"><div class="form-group"><label>Contact Person</label>
            <input type="text" name="contact_person" class="form-control" value="{{ supplier.contact_person|default:'' }}"></div></div>
          <div class="col-6"><div class="form-group"><label>Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ supplier.phone|default:'' }}"></div></div>
        </div>
        <div class="form-group"><label>Email</label>
          <input type="email" name="email" class="form-control" value="{{ supplier.email|default:'' }}"></div>
        <div class="form-group"><label>Address</label>
          <textarea name="address" class="form-control" rows="3">{{ supplier.address|default:'' }}</textarea></div>
        {% if action == 'Edit' %}
        <div class="custom-control custom-switch mb-3">
          <input type="checkbox" class="custom-control-input" id="is_active" name="is_active"
                 {% if supplier.is_active %}checked{% endif %}>
          <label class="custom-control-label" for="is_active">Active</label>
        </div>
        {% endif %}
        <div class="d-flex justify-content-end">
          <a href="{% url 'inventory:suppliers' %}" class="btn btn-light mr-2">Cancel</a>
          <button type="submit" class="btn btn-primary">Save Supplier</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

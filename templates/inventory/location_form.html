{% extends 'base.html' %}
{% block title %}{{ action }} Location{% endblock %}
{% block page_header %}
<div class="d-flex justify-content-between">
  <h4 class="font-weight-bold mb-0"><i class="fas fa-map-marker-alt mr-2 text-primary"></i>{{ action }} Location</h4>
  <a href="{% url 'inventory:locations' %}" class="btn btn-outline-secondary">Back</a>
</div>
{% endblock %}
{% block content %}
<div class="col-md-6">
  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group"><label class="font-weight-bold">Location Name *</label>
          <input type="text" name="name" class="form-control" value="{{ location.name|default:'' }}" required></div>
        <div class="form-group"><label>Address</label>
          <textarea name="address" class="form-control" rows="2">{{ location.address|default:'' }}</textarea></div>
        <div class="form-group"><label>Phone</label>
          <input type="text" name="phone" class="form-control" value="{{ location.phone|default:'' }}"></div>
        <div class="custom-control custom-switch mb-3">
          <input type="checkbox" class="custom-control-input" id="is_main" name="is_main"
                 {% if location.is_main %}checked{% endif %}>
          <label class="custom-control-label" for="is_main">Set as Main Location</label>
        </div>
        {% if action == 'Edit' %}
        <div class="custom-control custom-switch mb-3">
          <input type="checkbox" class="custom-control-input" id="is_active" name="is_active"
                 {% if location.is_active %}checked{% endif %}>
          <label class="custom-control-label" for="is_active">Active</label>
        </div>
        {% endif %}
        <div class="d-flex justify-content-end">
          <a href="{% url 'inventory:locations' %}" class="btn btn-light mr-2">Cancel</a>
          <button type="submit" class="btn btn-primary">Save Location</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Add Customer{% endblock %}
{% block page_header %}
<div class="d-flex justify-content-between">
  <h4 class="font-weight-bold mb-0"><i class="fas fa-user-plus mr-2 text-primary"></i>Add Customer</h4>
  <a href="{% url 'pos:customers' %}" class="btn btn-outline-secondary">Back</a>
</div>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="form-group"><label class="font-weight-bold">Full Name *</label>
            <input type="text" name="name" class="form-control" required autofocus></div>
          <div class="form-group"><label>Phone Number</label>
            <input type="text" name="phone" class="form-control" placeholder="024XXXXXXX"></div>
          <div class="form-group"><label>Email</label>
            <input type="email" name="email" class="form-control"></div>
          <div class="form-group"><label>Address</label>
            <textarea name="address" class="form-control" rows="2"></textarea></div>
          <div class="d-flex justify-content-end">
            <a href="{% url 'pos:customers' %}" class="btn btn-light mr-2">Cancel</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i>Save Customer</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
